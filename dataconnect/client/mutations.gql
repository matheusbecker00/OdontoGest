    @redact {
    clinicMemberships(
      where: {
        clinicId: { eq: $clinicId }
        userId: { eq_expr: "auth.uid" }
        status: { eq: ACTIVE }
        deletedAt: { eq: null }
      }
      limit: 1
    ) {
      id
      role {
        code
          @check(
            expr: "this == 'OWNER' || this == 'ADMIN'"
            message: "Insufficient permission"
          )
      }
    }
    clinicSubscriptions(where: { clinicId: { eq: $clinicId } }, limit: 1) {
      status
      currentPeriodEnd
    }
  }
  procedure_insert(
    data: {
      id: $id
      clinicId: $clinicId
      name: $name
      category: $category
      description: $description
      defaultPriceCents: $defaultPriceCents
      durationMinutes: $durationMinutes
      createdBy_expr: "auth.uid"
      updatedBy_expr: "auth.uid"
    }
  )
  auditLog_insert(
    data: {
      id: $auditId
      clinicId: $clinicId
      actorUserId_expr: "auth.uid"
      action: "PROCEDURE_CREATED"
      entityType: "Procedure"
      entityId: $id
      outcome: SUCCESS
      requestId: $requestId
