mutation CreateMyDentist(
  $id: UUID!
  $clinicId: UUID!
  $name: String!
  $cro: String!
  $croState: String!
  $specialty: String!
  $phone: String
  $email: String
  $calendarColor: String!
  $defaultAppointmentMinutes: Int!
  $auditId: UUID!
  $requestId: String!
)
@auth(
  expr: "auth.uid != '' && vars.defaultAppointmentMinutes >= 10 && vars.defaultAppointmentMinutes <= 480"
)
@transaction {
  query
    @check(
      expr: "response.query.clinicMemberships.size() == 1"
      message: "Active clinic membership required"
    )
    @check(
      expr: "response.query.clinicSubscriptions.size() == 1 && (response.query.clinicSubscriptions[0].status == 'ACTIVE' || ((response.query.clinicSubscriptions[0].status == 'TRIAL' || response.query.clinicSubscriptions[0].status == 'CHECKOUT_STARTED' || response.query.clinicSubscriptions[0].status == 'PENDING') && response.query.clinicSubscriptions[0].currentPeriodEnd != null && response.query.clinicSubscriptions[0].currentPeriodEnd > request.time))"
      message: "Active subscription required"
    )
    @redact {
    clinicMemberships(
      where: {
        clinicId: { eq: $clinicId }
        userId: { eq_expr: "auth.uid" }
        status: { eq: ACTIVE }
        deletedAt: { eq: null }
      }
      limit: 1
    ) {
      id
      role {
        code
          @check(
            expr: "this == 'OWNER' || this == 'ADMIN'"
            message: "Insufficient permission"
          )
      }
    }
    clinicSubscriptions(where: { clinicId: { eq: $clinicId } }, limit: 1) {
      status
      currentPeriodEnd
    }
  }
  dentist_insert(
    data: {
      id: $id
      clinicId: $clinicId
      name: $name
      cro: $cro
      croState: $croState
      specialty: $specialty
      phone: $phone
      email: $email
      calendarColor: $calendarColor
      defaultAppointmentMinutes: $defaultAppointmentMinutes
      createdBy_expr: "auth.uid"
      updatedBy_expr: "auth.uid"
    }
  )
  auditLog_insert(
    data: {
      id: $auditId
      clinicId: $clinicId
      actorUserId_expr: "auth.uid"
      action: "DENTIST_CREATED"
      entityType: "Dentist"
      entityId: $id
      outcome: SUCCESS
      requestId: $requestId
    }
  )
}

