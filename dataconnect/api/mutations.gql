mutation UpsertFirebaseUser(
  $uid: String!
  $name: String!
  $email: String!
  $emailCanonical: String!
  $emailVerifiedAt: Timestamp
) @auth(level: NO_ACCESS) @transaction {
  user_upsert(
    data: {
      id: $uid
      name: $name
      email: $email
      emailCanonical: $emailCanonical
      status: ACTIVE
      emailVerifiedAt: $emailVerifiedAt
      updatedAt_expr: "request.time"
    }
  )
}

