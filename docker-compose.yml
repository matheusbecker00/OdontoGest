name: odontogest

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: odontogest
      POSTGRES_USER: odontogest_owner
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?Defina POSTGRES_OWNER_PASSWORD no .env}
      ODONTOGEST_DB_APP_PASSWORD: ${ODONTOGEST_DB_APP_PASSWORD:?Defina ODONTOGEST_DB_APP_PASSWORD no .env}
      TZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Defina REDIS_PASSWORD no .env}
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks:
      - backend

networks:
  backend:
    internal: false

volumes:
  postgres-data:
  redis-data:
