packages:
  - apps/*
  - packages/*

allowBuilds:
  "@parcel/watcher": true
  "@prisma/engines": true
  "@scarf/scarf": false
  argon2: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true
  unrs-resolver: true

catalog:
  prettier: 3.9.5
  typescript: 5.9.3

overrides:
  "@hono/node-server": 1.19.14
  js-yaml: 4.3.0
  markdown-it: 14.3.0

minimumReleaseAgeExclude:
  - "@angular/cdk@22.0.5"
  - "@angular/material@22.0.5"
